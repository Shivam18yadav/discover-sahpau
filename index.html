<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Sahpau | Food, Places & Stays</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js and Vanilla Tilt for 3D Materials/Effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Font (Inter for a modern look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Enhanced entry animation */
        @keyframes fadeInScale { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate-fade-in { animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Animated gradient sweep for buttons */
        @keyframes gradientSweep {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-sweep:hover {
            background-size: 200% auto;
            animation: gradientSweep 2s linear infinite;
        }

        /* 3D Material specific styles */
        .preserve-3d { transform-style: preserve-3d; }
        .pop-out { transform: translateZ(30px); }
        .pop-out-sm { transform: translateZ(15px); }
        #canvas-container { pointer-events: none; }
    </style>
</head>
<body class="min-h-screen bg-[#fafafa] text-gray-900 flex flex-col antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Modern Hero Section (Ultra-Compacted) -->
    <header class="relative pt-8 pb-6 px-4 sm:px-6 lg:px-8 overflow-hidden" id="hero-header">
        
        <!-- 3D Canvas Container -->
        <div id="canvas-container" class="absolute inset-0 -z-20"></div>

        <!-- Soft Background Gradient Overlay -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-50/80 via-white/80 to-[#fafafa] -z-10 backdrop-blur-[1px]"></div>
        
        <div class="max-w-2xl mx-auto text-center">
            <!-- Tiny Badge -->
            <div class="inline-flex items-center justify-center px-3 py-1 rounded-full bg-white border border-gray-200 shadow-sm text-xs font-semibold text-gray-600 mb-3 animate-fade-in" style="animation-delay: 0.1s; opacity: 0;">
                <span class="flex w-2 h-2 rounded-full bg-indigo-500 mr-2 animate-pulse"></span>
                Your Local Guide
            </div>
            
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold tracking-tight mb-3 animate-fade-in" style="animation-delay: 0.2s; opacity: 0;">
                Discover <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-cyan-500">Sahpau</span>
            </h1>
            
            <p class="text-sm md:text-base text-gray-500 max-w-lg mx-auto mb-5 leading-relaxed font-medium animate-fade-in" style="animation-delay: 0.3s; opacity: 0;">
                The best local food, ancient spiritual landmarks, and comfortable stays. Handpicked for your perfect visit.
            </p>
            
            <a 
                href="https://maps.app.goo.gl/CV2Ckq8kL9ruJMdu5" 
                target="_blank" 
                rel="noopener noreferrer"
                class="inline-flex items-center px-5 py-2.5 rounded-full text-sm font-bold text-white bg-gray-900 hover:bg-indigo-600 shadow-lg shadow-gray-900/10 hover:shadow-indigo-500/25 transition-all duration-300 hover:-translate-y-0.5 active:scale-95 animate-fade-in"
                style="animation-delay: 0.4s; opacity: 0;"
            >
                <i data-lucide="map" class="w-4 h-4 mr-2"></i>
                View Area Map
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pt-4 pb-8 flex-grow w-full">
        
        <!-- Navigation Tabs Container -->
        <div class="flex justify-center mb-6 animate-fade-in" style="animation-delay: 0.5s; opacity: 0;">
            <div id="tabs-container" class="inline-flex flex-col sm:flex-row p-1 bg-white shadow-sm border border-gray-200 rounded-2xl sm:rounded-full space-y-1 sm:space-y-0 sm:space-x-1">
                <!-- Tabs injected by JS -->
            </div>
        </div>

        <!-- Location Cards Grid -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards injected by JS -->
        </div>

    </main>

    <!-- Simple Footer -->
    <footer class="border-t border-gray-200 bg-white py-8 text-center mt-auto">
        <p class="text-sm font-medium text-gray-400">Made for the travelers of Sahpau.</p>
        <p class="mt-1.5 text-xs font-medium text-gray-400 opacity-75">&copy; 2026 Shivam Yadav. All rights reserved.</p>
    </footer>

    <!-- Application Logic -->
    <script>
        const locations = [
            // Food
            {
                id: 1, category: 'food', name: 'Shiva Veg Biryani', icon: 'utensils',
                specialty: 'Famous for Veg Pulav',
                address: 'Dharamshala Chauraha, Sahpau', mapLink: 'https://maps.app.goo.gl/zhdVRYviAc83r1Tp7',
                timing: '8:00 AM - 12:00 PM'
            },
            {
                id: 2, category: 'food', name: 'Ajay Bhelpuri Shop', icon: 'utensils',
                specialty: 'Famous for Bhelpuri',
                address: 'Near Prachin Hanuman Mandir, Sahpau', mapLink: 'https://maps.app.goo.gl/WVPTgwAcF7E8jHHo9',
                timing: '4:00 PM - 8:00 PM'
            },
            {
                id: 3, category: 'food', name: 'Maa Vaishno Devi Misthan Bhandar', icon: 'utensils',
                specialty: 'Famous for Samosas, Kachoris & Sweets',
                address: 'Main Bazar, Sahpau', mapLink: 'https://maps.app.goo.gl/4XVnb8RJjhGZ7rNN9',
                timing: '8:00 AM - 8:00 PM'
            },
            {
                id: 4, category: 'food', name: 'Pappu Fast Food', icon: 'utensils',
                specialty: 'Famous for Pani Puri & Chaat',
                address: 'Dharamshala Chauraha, Sahpau', mapLink: 'https://maps.app.goo.gl/CH8zGC9X5xVnvpFi8',
                timing: '2:00 PM - 7:00 PM'
            },
            // Places
            {
                id: 5, category: 'place', name: 'BhadraKali Mata Temple', icon: 'landmark',
                specialty: 'Ancient temple visited by 5000+ devotees on Mondays',
                address: 'Sahpau', mapLink: 'https://maps.app.goo.gl/J46ePpaEeaEevdAr7',
                timing: 'Open 24/7'
            },
            // Stays
            {
                id: 6, category: 'stay', name: 'DS Farm House', icon: 'bed',
                specialty: 'Best place to stay in Sahpau',
                address: 'Near Tharora Puliya, Jalesar Road', mapLink: 'https://maps.app.goo.gl/CUtf5nNetbfMWfww6',
                timing: 'Open 24/7'
            }
        ];

        const tabs = [
            { id: 'food', label: 'Great Food', icon: 'utensils' },
            { id: 'place', label: 'Places to Visit', icon: 'landmark' },
            { id: 'stay', label: 'Where to Stay', icon: 'bed' }
        ];

        let activeTab = 'food';

        const tabsContainer = document.getElementById('tabs-container');
        const cardsContainer = document.getElementById('cards-container');

        function renderTabs() {
            tabsContainer.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                const baseClasses = "flex items-center justify-center px-5 py-2.5 rounded-xl sm:rounded-full font-semibold text-sm transition-all duration-300 cursor-pointer w-full sm:w-auto";
                const activeClasses = isActive 
                    ? "bg-gray-900 text-white shadow-md" 
                    : "bg-transparent text-gray-500 hover:text-gray-900 hover:bg-gray-100";
                const iconColor = isActive ? "text-gray-300" : "text-gray-400";

                return `
                    <button onclick="changeTab('${tab.id}')" class="${baseClasses} ${activeClasses}">
                        <i data-lucide="${tab.icon}" class="w-4 h-4 mr-2 ${iconColor}"></i>
                        ${tab.label}
                    </button>
                `;
            }).join('');
        }

        function renderCards() {
            const filteredLocations = locations.filter(loc => loc.category === activeTab);
            
            if (filteredLocations.length === 0) {
                cardsContainer.innerHTML = `<div class="col-span-full text-center py-12"><p class="text-gray-400 font-medium text-lg">More amazing spots coming soon.</p></div>`;
            } else {
                cardsContainer.innerHTML = filteredLocations.map((location, index) => `
                    <div class="tilt-card preserve-3d relative bg-white rounded-3xl p-5 shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-gray-100 transition-all duration-500 flex flex-col h-full group animate-fade-in overflow-hidden z-10 hover:border-indigo-100 hover:shadow-[0_20px_40px_-10px_rgba(79,70,229,0.15)]" 
                         style="animation-delay: ${index * 0.08}s; opacity: 0;"
                         data-tilt data-tilt-max="6" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.15" data-tilt-scale="1.03">
                        
                        <!-- Subtle Background Glow on Hover -->
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-50/40 to-cyan-50/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 -z-10"></div>

                        <div class="flex flex-col flex-grow preserve-3d">
                            <!-- Compact Header -->
                            <div class="flex items-center gap-4 mb-4 pop-out">
                                <div class="flex-shrink-0 inline-flex items-center justify-center w-12 h-12 bg-gray-50 text-gray-500 rounded-2xl group-hover:scale-110 group-hover:bg-gradient-to-br group-hover:from-indigo-500 group-hover:to-cyan-500 group-hover:text-white group-hover:shadow-lg group-hover:shadow-indigo-500/30 transition-all duration-500 group-hover:-rotate-6">
                                    <i data-lucide="${location.icon}" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-900 tracking-tight leading-tight group-hover:text-indigo-600 transition-colors duration-300">
                                        ${location.name}
                                    </h3>
                                    <div class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-widest bg-emerald-50 text-emerald-600 mt-1">
                                        Specialty
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Main Text -->
                            <div class="mb-2 flex-grow pop-out-sm">
                                <p class="text-gray-600 text-sm font-medium leading-relaxed">
                                    ${location.specialty}
                                </p>
                            </div>
                        </div>
                        
                        <!-- Footer Section -->
                        <div class="mt-4 pt-4 border-t border-gray-100 group-hover:border-indigo-100 transition-colors duration-500 preserve-3d">
                            <div class="space-y-2 mb-4 pop-out-sm">
                                <div class="flex items-center text-xs text-gray-500 font-medium group-hover:text-gray-700 transition-colors duration-300">
                                    <i data-lucide="clock" class="w-4 h-4 mr-2 text-indigo-400 group-hover:scale-110 transition-transform duration-300"></i>
                                    ${location.timing}
                                </div>
                                <div class="flex items-center text-xs text-gray-500 font-medium group-hover:text-gray-700 transition-colors duration-300">
                                    <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-indigo-400 group-hover:scale-110 transition-transform duration-300"></i>
                                    <span class="line-clamp-1">${location.address}</span>
                                </div>
                            </div>
                            
                            <!-- Animated Map Button -->
                            <a 
                                href="${location.mapLink}"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="pop-out w-full inline-flex items-center justify-center px-4 py-2.5 bg-gray-50 border border-transparent text-gray-700 rounded-xl font-semibold text-sm hover:!bg-gradient-to-r hover:!from-indigo-500 hover:!via-cyan-500 hover:!to-indigo-500 hover:text-white hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-500 group/btn btn-sweep"
                            >
                                <i data-lucide="navigation" class="w-4 h-4 mr-2 group-hover/btn:-translate-y-0.5 group-hover/btn:translate-x-0.5 transition-transform duration-300"></i>
                                Open in Maps
                            </a>
                        </div>
                    </div>
                `).join('');
            }
            
            lucide.createIcons();

            // Initialize 3D tilt on newly rendered cards
            VanillaTilt.init(document.querySelectorAll(".tilt-card"));
        }

        window.changeTab = function(tabId) {
            activeTab = tabId;
            renderTabs();
            renderCards();
            lucide.createIcons();
            
            // Trigger 3D theme change if the function is ready
            if (typeof window.update3DTheme === 'function') {
                window.update3DTheme(tabId);
            }
        };

        // Initialize
        renderTabs();
        renderCards();
        lucide.createIcons();

        // 3D Background Implementation using Three.js
        window.addEventListener('load', function () {
            const container = document.getElementById('canvas-container');
            const header = document.getElementById('hero-header');
            
            if(!container || !header) return;

            const scene = new THREE.Scene();
            
            // Camera setup
            const camera = new THREE.PerspectiveCamera(75, header.clientWidth / header.clientHeight, 0.1, 1000);
            camera.position.z = 15;

            // Renderer setup
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(header.clientWidth, header.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting to make materials look 3D and premium
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x6366f1, 1);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            const pointLight2 = new THREE.PointLight(0x06b6d4, 1);
            pointLight2.position.set(-10, -10, 10);
            scene.add(pointLight2);

            // Create 3D floating materials/shapes
            const shapes = [];
            
            // Glassy material
            const glassMaterial = new THREE.MeshPhysicalMaterial({ 
                color: 0xffffff, 
                metalness: 0.1, 
                roughness: 0.1,
                transmission: 0.9, 
                thickness: 0.5,
                transparent: true,
                opacity: 0.6
            });
            
            const shapeMaterial1 = new THREE.MeshPhysicalMaterial({ color: 0x6366f1, metalness: 0.2, roughness: 0.3 });
            const shapeMaterial2 = new THREE.MeshPhysicalMaterial({ color: 0x06b6d4, metalness: 0.2, roughness: 0.3 });

            // Shape 1: Torus
            const torus = new THREE.Mesh(new THREE.TorusGeometry(3, 0.8, 16, 100), shapeMaterial1);
            torus.position.set(-10, 2, -5);
            scene.add(torus);
            shapes.push({ mesh: torus, rx: 0.005, ry: 0.01, yOffset: torus.position.y });

            // Shape 2: Icosahedron
            const icosa = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 0), shapeMaterial2);
            icosa.position.set(12, -2, -8);
            scene.add(icosa);
            shapes.push({ mesh: icosa, rx: 0.01, ry: 0.005, yOffset: icosa.position.y });
            
            // Shape 3: Sphere (Glass)
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), glassMaterial);
            sphere.position.set(2, 6, -12);
            scene.add(sphere);
            shapes.push({ mesh: sphere, rx: 0.002, ry: 0.002, yOffset: sphere.position.y });

            // Dynamic Theme System
            let targetColor1 = new THREE.Color();
            let targetColor2 = new THREE.Color();

            window.update3DTheme = function(category) {
                const themes = {
                    food: { c1: 0xf97316, c2: 0xfacc15 },  // Orange & Yellow
                    place: { c1: 0x8b5cf6, c2: 0xd946ef }, // Violet & Fuchsia
                    stay: { c1: 0x10b981, c2: 0x06b6d4 }   // Emerald & Cyan
                };
                const theme = themes[category] || themes.food;
                targetColor1.setHex(theme.c1);
                targetColor2.setHex(theme.c2);
            };

            // Set initial colors
            window.update3DTheme(activeTab);

            // Animation Loop
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.01;

                // Smoothly interpolate colors to the target theme for materials AND lights
                shapeMaterial1.color.lerp(targetColor1, 0.03);
                shapeMaterial2.color.lerp(targetColor2, 0.03);
                pointLight.color.lerp(targetColor1, 0.03);
                pointLight2.color.lerp(targetColor2, 0.03);

                shapes.forEach(shape => {
                    shape.mesh.rotation.x += shape.rx;
                    shape.mesh.rotation.y += shape.ry;
                    // Gentle floating effect
                    shape.mesh.position.y = shape.yOffset + Math.sin(time + shape.mesh.position.x) * 0.5;
                });

                renderer.render(scene, camera);
            }
            animate();

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = header.clientWidth / header.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(header.clientWidth, header.clientHeight);
            });
        });
    </script>
</body>
</html>

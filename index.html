<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Sahpau | Food, Places & Stays</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">

    <!-- Hero Section -->
    <header class="bg-gradient-to-br from-emerald-600 to-teal-900 text-white py-16 px-4 sm:px-6 lg:px-8 shadow-lg">
        <div class="max-w-5xl mx-auto text-center">
            <div class="inline-flex items-center justify-center p-3 bg-white/20 rounded-full mb-6 backdrop-blur-sm">
                <i data-lucide="map" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
                Discover Sahpau
            </h1>
            <p class="text-lg md:text-xl text-emerald-100 max-w-2xl mx-auto mb-8 leading-relaxed">
                Your curated guide to the best eats, spiritual landmarks, and comfortable stays in the heart of Sahpau.
            </p>
            <a 
                href="https://maps.app.goo.gl/CV2Ckq8kL9ruJMdu5" 
                target="_blank" 
                rel="noopener noreferrer"
                class="inline-flex items-center px-6 py-3 border border-transparent text-base font-semibold rounded-full shadow-sm text-emerald-700 bg-white hover:bg-emerald-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all duration-200 hover:scale-105 active:scale-95"
            >
                <i data-lucide="map-pin" class="w-5 h-5 mr-2"></i>
                View Sahpau on Map
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
        
        <!-- Navigation Tabs -->
        <div id="tabs-container" class="flex flex-col sm:flex-row justify-center space-y-2 sm:space-y-0 sm:space-x-4 mb-12">
            <!-- Tabs will be injected here by JavaScript -->
        </div>

        <!-- Location Cards Grid -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Cards will be injected here by JavaScript -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 text-center mt-auto">
        <p class="text-sm">
            A local guide to exploring Sahpau.
        </p>
    </footer>

    <!-- Application Logic -->
    <script>
        // Application Data
        const locations = [
            // Food
            {
                id: 1, category: 'food', name: 'Shiva Veg Biryani', icon: 'utensils',
                description: 'Renowned locally for serving the most flavorful and aromatic Veg Pulav in town. A must-visit destination for those who appreciate perfectly spiced rice dishes.',
                address: 'Dharamshala Chauraha, Sahpau', mapLink: 'https://maps.app.goo.gl/zhdVRYviAc83r1Tp7',
                timing: '8:00 AM - 12:00 PM'
            },
            {
                id: 2, category: 'food', name: 'Ajay Bhelpuri Shop', icon: 'utensils',
                description: 'The ultimate spot for authentic, tangy, and crunchy Bhelpuri. A beloved local favorite for a quick, delicious evening street-food snack.',
                address: 'Near Prachin Hanuman Mandir, Sahpau', mapLink: 'https://maps.app.goo.gl/WVPTgwAcF7E8jHHo9',
                timing: '4:00 PM - 8:00 PM'
            },
            {
                id: 3, category: 'food', name: 'Maa Vaishno Devi Misthan Bhandar', icon: 'utensils',
                description: 'A traditional and beloved sweet shop famous for its piping hot, crispy samosas, perfectly spiced kachoris, and a wide, mouth-watering assortment of Indian sweets.',
                address: 'Main Bazar, Sahpau', mapLink: 'https://maps.app.goo.gl/4XVnb8RJjhGZ7rNN9',
                timing: '8:00 AM - 8:00 PM'
            },
            {
                id: 4, category: 'food', name: 'Pappu Fast Food', icon: 'utensils',
                description: 'The go-to neighborhood spot for irresistible Pani Puris and lip-smacking Chaat. Guaranteed to satisfy your spicy and tangy street food cravings.',
                address: 'Dharamshala Chauraha, Sahpau', mapLink: 'https://maps.app.goo.gl/CH8zGC9X5xVnvpFi8',
                timing: '2:00 PM - 7:00 PM'
            },
            // Places
            {
                id: 5, category: 'place', name: 'BhadraKali Mata Temple', icon: 'landmark',
                description: 'An ancient, highly revered spiritual sanctuary drawing over 5,000 devoted visitors every Monday. A beautifully serene and culturally essential landmark that you simply must visit.',
                address: 'Sahpau', mapLink: 'https://maps.app.goo.gl/J46ePpaEeaEevdAr7',
                timing: 'Open 24/7'
            },
            // Stays
            {
                id: 6, category: 'stay', name: 'DS Farm House', icon: 'bed',
                description: 'A premier accommodation offering a highly comfortable, secure, and peaceful stay. Widely recognized as the top choice for travelers looking to relax in the area.',
                address: 'Near Tharora Puliya, Jalesar Road', mapLink: 'https://maps.app.goo.gl/CUtf5nNetbfMWfww6',
                timing: 'Open 24/7'
            }
        ];

        const tabs = [
            { id: 'food', label: 'Great Food', icon: 'utensils' },
            { id: 'place', label: 'Places to Visit', icon: 'landmark' },
            { id: 'stay', label: 'Where to Stay', icon: 'bed' }
        ];

        let activeTab = 'food';

        // DOM Elements
        const tabsContainer = document.getElementById('tabs-container');
        const cardsContainer = document.getElementById('cards-container');

        // Render Tabs
        function renderTabs() {
            tabsContainer.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                const baseClasses = "flex items-center justify-center px-6 py-4 rounded-xl font-medium text-sm sm:text-base transition-all duration-200 cursor-pointer";
                const activeClasses = isActive 
                    ? "bg-emerald-600 text-white shadow-md transform scale-105" 
                    : "bg-white text-slate-600 hover:bg-emerald-50 hover:text-emerald-700 shadow-sm border border-slate-200";
                const iconColor = isActive ? "text-emerald-100" : "text-slate-400";

                return `
                    <button onclick="changeTab('${tab.id}')" class="${baseClasses} ${activeClasses}">
                        <i data-lucide="${tab.icon}" class="w-5 h-5 mr-2 ${iconColor}"></i>
                        ${tab.label}
                    </button>
                `;
            }).join('');
        }

        // Render Cards
        function renderCards() {
            const filteredLocations = locations.filter(loc => loc.category === activeTab);
            
            if (filteredLocations.length === 0) {
                cardsContainer.innerHTML = `<div class="col-span-1 md:col-span-2 text-center py-12"><p class="text-slate-500 text-lg">No locations found.</p></div>`;
            } else {
                cardsContainer.innerHTML = filteredLocations.map(location => `
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-shadow duration-300 flex flex-col h-full group animate-fade-in">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center space-x-3">
                                <div class="p-3 bg-emerald-100 text-emerald-600 rounded-lg group-hover:bg-emerald-600 group-hover:text-white transition-colors duration-300">
                                    <i data-lucide="${location.icon}" class="w-6 h-6"></i>
                                </div>
                                <h3 class="text-xl font-bold text-slate-900 leading-tight">
                                    ${location.name}
                                </h3>
                            </div>
                        </div>
                        
                        <p class="text-slate-600 mb-6 flex-grow leading-relaxed">
                            ${location.description}
                        </p>
                        
                        <div class="mt-auto pt-6 border-t border-slate-100">
                            <div class="flex items-start space-x-2 text-sm text-slate-500 mb-2">
                                <i data-lucide="clock" class="w-4 h-4 mt-0.5 flex-shrink-0 text-emerald-500"></i>
                                <span>${location.timing}</span>
                            </div>
                            <div class="flex items-start space-x-2 text-sm text-slate-500 mb-4">
                                <i data-lucide="map-pin" class="w-4 h-4 mt-0.5 flex-shrink-0 text-emerald-500"></i>
                                <span>${location.address}</span>
                            </div>
                            
                            <a 
                                href="${location.mapLink}"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="w-full flex items-center justify-center px-4 py-3 bg-slate-900 text-white rounded-xl font-medium hover:bg-slate-800 transition-colors duration-200 focus:ring-4 focus:ring-slate-200"
                            >
                                <i data-lucide="navigation" class="w-4 h-4 mr-2"></i>
                                Open in Maps
                                <i data-lucide="external-link" class="w-4 h-4 ml-2 opacity-70"></i>
                            </a>
                        </div>
                    </div>
                `).join('');
            }
            
            // Re-initialize icons after injecting new HTML
            lucide.createIcons();
        }

        // Handle Tab Change
        window.changeTab = function(tabId) {
            activeTab = tabId;
            renderTabs();
            renderCards();
            lucide.createIcons(); // Refresh icons on tab change
        };

        // Add some basic CSS for fade-in animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        `;
        document.head.appendChild(style);

        // Initial Initialization
        renderTabs();
        renderCards();
        lucide.createIcons(); // Initial icon load
    </script>
</body>
</html>
